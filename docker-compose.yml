  qdrant:
    image: qdrant/qdrant
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  tika:
    image: apache/tika:latest
    ports:
      - "9998:9998"

  postgres:
    image: postgres:15
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    env_file:
      - ./src/fse_memory/.env
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pantherbot} -d ${POSTGRES_DB:-pantherbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

