services:
  slack-bot:
    build: .
    command: python src/slack/bot.py
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_INTERMEDIATE_HOST=host.docker.internal
      - OLLAMA_INTERMEDIATE_PORT=10002
      - RERANK_DISABLED=true
      - PYTHONPATH=/app/src
      - LOCAL_DEV
    env_file:
      - ./src/slack/.env
      - ./src/memory/.env
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped
    profiles:
      - full

  streamlit:
    build: .
    command: streamlit run src/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_INTERMEDIATE_HOST=host.docker.internal
      - OLLAMA_INTERMEDIATE_PORT=10002
      - PYTHONPATH=/app/src
      - LOCAL_DEV
    depends_on:
      - qdrant
      - tika

  qdrant:
    image: qdrant/qdrant
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  tika:
    image: apache/tika:latest
    ports:
      - "9998:9998"

  postgres:
    image: postgres:15
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    env_file:
      - ./src/memory/.env
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pantherbot} -d ${POSTGRES_DB:-pantherbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

