embedding:
  model: "qwen3-embedding"
  dimension: 4096
  batch_size: 32
  ollama_host: "localhost"
  ollama_port: 10001
  add_prefixes: true
  lowercase: false
  normalize_unicode: true
  collapse_whitespace: true
  dehyphenate: true

llm:
  primary_model: "qwen3.5:35b"
  temperature: 0.0
  top_p: 0.9
  min_tokens: 100
  max_tokens: 7000
  context_length: 256000
  timeout: 600

  router_timeout: 30
  router_host: "localhost"
  router_port: 10002

  ollama_options:
    keep_alive: "30m"
    num_ctx: 256000

  system_prompt: >
    You are a concise AI {role} for {department}. Answer questions directly using the provided information.

    CORE PRINCIPLES:
    - Get straight to the answer - no fluff or pleasantries
    - Use exact references from the knowledge base
    - One answer per question - don't anticipate follow-ups
    - Dense information, minimal words

    RESPONSE STYLE (Slack chat - mobile friendly):
    - Lead with the direct answer in first sentence
    - Use bullets only when listing 3+ items
    - Skip introductory phrases like "Based on the catalog..." or "According to..."
    - No markdown headers - use plain text organization
    - Maximum clarity, minimum tokens

    ACCURACY RULES:
    - Trust provided context from official sources
    - State facts without hedging unless truly uncertain
    - If context lacks info: "This information isn't in the provided knowledge base. Contact {contact_email}"
    - For partial info: Give what you have, state what's missing

    KEY POLICIES (state only when asked):
    - 42 upper division units required to graduate
    - 18 credit max per semester
    - Study abroad upper division courses count; lower division need UD replacement
    - "Every semester" = fall and spring
    - Waitlisted courses: Talk to instructor in person first week, then request permission code online

    WHEN TO BE COMPREHENSIVE vs BRIEF:
    - "What are the requirements" → Full list
    - "How many credits" → Just the number
    - "Can I take..." → Yes/no + critical constraint if any
    - "List all electives" → Complete list
    - "Tell me about [program]" → Key highlights only (5-7 bullets max)

reranker:
  model: "xitao/bge-reranker-v2-m3"
  batch_size: 32
  max_candidates_for_rerank: 200
  activation: "sigmoid"

query_router:
  router_model: "qwen3.5:9b"
  router_temperature: 0.1
  router_max_tokens: 500
  prompt_template: |
    Route this academic advising query to the correct collection(s). Follow the rules EXACTLY.

    Collections:
    - major_catalogs: Degree requirements, required courses, major electives, prerequisites, graduation requirements for a major
    - minor_catalogs: Minor program requirements and courses ONLY
    - 4_year_plans: Course scheduling — which semester/year to take a course, recommended 4-year schedules
    - general_knowledge: Administrative policies, registration deadlines, GPA rules, petitions, study abroad

    RULES (apply in order, use the FIRST matching rule):
    1. Query asks about a 4-year plan/schedule that mentions BOTH major AND minor → ["4_year_plans", "major_catalogs", "minor_catalogs"]
    2. Query asks to "generate" or "create" a plan/schedule with major and/or minor → ["4_year_plans", "major_catalogs", "minor_catalogs"]
    3. "When/what semester should I take [course]?" or course scheduling → ["4_year_plans", "major_catalogs"]
    4. Query mentions "minor" requirements/courses but NOT asking about a full plan → ["minor_catalogs"]
    5. What courses/requirements are needed for a degree or graduation → ["major_catalogs"]
    6. Prerequisites, major electives, major course requirements → ["major_catalogs"]
    7. Administrative policies, deadlines, registration, GPA policies → ["general_knowledge"]

    NOTE: Graduation REQUIREMENTS (what courses you need) → major_catalogs. Graduation PROCEDURES/POLICIES → general_knowledge.

    Student Context: {context}
    Query: "{query}"

    Examples:
    - "Generate a 4 year plan for CS major and game dev minor" → {{"collections": ["4_year_plans", "major_catalogs", "minor_catalogs"], "token_allocation": 600, "reasoning": "4-year plan with major and minor"}}
    - "What math courses do I need for graduation?" → {{"collections": ["major_catalogs"], "token_allocation": 400, "reasoning": "graduation requirements"}}
    - "What are the CPSC 350 prerequisites?" → {{"collections": ["major_catalogs"], "token_allocation": 300, "reasoning": "prerequisites"}}
    - "What electives can I take for CS?" → {{"collections": ["major_catalogs"], "token_allocation": 300, "reasoning": "major electives"}}
    - "analytics minor requirements" → {{"collections": ["minor_catalogs"], "token_allocation": 300, "reasoning": "minor requirements"}}
    - "When should I take CPSC 406?" → {{"collections": ["4_year_plans", "major_catalogs"], "token_allocation": 400, "reasoning": "course scheduling"}}
    - "add/drop deadline" → {{"collections": ["general_knowledge"], "token_allocation": 200, "reasoning": "registration policy"}}

    Respond with JSON ONLY: {{"collections": [...], "token_allocation": <number>, "reasoning": "brief explanation"}}
