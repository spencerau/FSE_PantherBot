qdrant:
  timeout: 60

ingestion:
  section_detection:
    enabled: true
    default_section: "general"
    patterns:
      - pattern: "grand challenges initiative"
        section: "grand_challenges"
      - pattern: "lower-division (?:core )?requirements"
        section: "lower_division"
      - pattern: "upper-division requirements"
        section: "upper_division"
      - pattern: "electives \\(\\d+ credits\\)"
        section: "electives"
      - pattern: "professional portfolio"
        section: "portfolio"
      - pattern: "colloquium requirement"
        section: "colloquium"
      - pattern: "total credits"
        section: "summary"

retrieval:
  min_chunks_per_collection: 3
  collection_max_chunks:
    4_year_plans: 4
    general_knowledge: 20

query_router:
  max_tokens: 10000
