# Core RAG System Configuration
system:
  name: "Fowler School of Engineering Academic Advisor"
  version: "1.0.0"
  description: "Unified collection-based RAG system for academic advising"

# Domain-Specific Configuration
domain:
  bot_name: "PantherBot"
  role: "academic advisor"
  institution: "Chapman University"
  department: "Fowler School of Engineering"
  contact_email: "fseadvising@chapman.edu"
  
  programs:
    Computer Science: "compsci"
    Computer Engineering: "compeng"
    Electrical Engineering: "eleceng"
    Software Engineering: "softeng"
    Data Science: "datasci"
  
  available_programs:
    - "Computer Science"
    - "Computer Engineering"
    - "Software Engineering"
    - "Electrical Engineering"
    - "Data Science"
  
  minors:
    Analytics: "anal"
    Computer Science: "compsci"
    Computer Engineering: "compeng"
    Electrical Engineering: "eleceng"
    Game Development: "gamedev"
    Information Security Policy: "isp"
  
  catalog_years:
    - "2022"
    - "2023"
    - "2024"
    - "2025"
  
  # Router context description
  router_context: "an academic advising chatbot"
  
  # Prompt context identifier
  prompt_context: "Chapman University's academic catalogs"
  
  # Document type to collection mapping
  document_type_mapping:
    "major_catalog": "major_catalogs"
    "minor_catalog": "minor_catalogs"
    "general_knowledge": "general_knowledge"
    "4_year_plan": "4_year_plans"
  
  # Terms to boost in reranker (domain-specific)
  boost_terms:
    - "requirement"
    - "prerequisite"
    - "course"
    - "credit"
    - "gpa"
    - "degree"
    - "major"
    - "minor"
    - "graduation"
    - "semester"
  
  # # Search term variations for filtering (used in 4-year plan searches)
  # program_search_terms:
  #   cs: ["cs", "computer science", "compsci"]
  #   ce: ["ce", "computer engineering", "compeng"]
  #   ee: ["ee", "electrical engineering", "eleceng"]
  #   se: ["se", "software engineering", "softeng"]
  #   ds: ["ds", "data science", "datasci"]

# Qdrant Vector Database Configuration
qdrant:
  host: "localhost"
  port: 6333
  timeout: 150
  collections:
    major_catalogs: "major_catalogs"
    minor_catalogs: "minor_catalogs"
    general_knowledge: "general_knowledge"
    4_year_plans: "4_year_plans"

# data:
#   major_catalog_json_path: "data/major_catalog_json"
#   minor_catalog_path: "data/minor_catalog"
#   general_knowledge_path: "data/general_knowledge"
#   4_year_plans: "data/4_year_plans"

data_directories:
  major_catalogs: "data/major_catalog"
  minor_catalogs: "data/minor_catalog"
  general_knowledge: "data/general_knowledge"
  4_year_plans: "data/4_year_plans"

# Embedding Configuration
embedding:
  # compute cluster embedding model
  model: "bge-m3:567m"
  # local laptop embedding model  
  # model: "nomic-embed-text"
  
  batch_size: 32
  ollama_host: "localhost"
  ollama_port: 11434
  add_prefixes: true
  lowercase: false
  normalize_unicode: true
  collapse_whitespace: true
  dehyphenate: true

# Chunker Configuration
chunker:
  strategy: "recursive"
  target_tokens: 1000
  min_tokens: 500
  overlap_ratio: 0.1
  respect_headings: true
 
# LLM Configuration
llm:
  # main response generation model
  primary_model: "gpt-oss:120b"
  temperature: 0.0  # deterministic for consistency
  top_p: 0.9        # slightly higher for natural conciseness
  min_tokens: 100    # allow very short answers when appropriate
  max_tokens: 7000  # increased for complete 4-year plans with formatting
  context_length: 128000
  timeout: 600
  
  # intermediate llm for query routing and memory compression
  # runs on separate container/port for resource isolation
  router_model: "gpt-oss:20b"
  router_temperature: 0.1
  router_max_tokens: 500
  router_timeout: 30
  router_host: "localhost"  # uses OLLAMA_INTERMEDIATE_HOST env var if set
  router_port: 11435         # uses OLLAMA_INTERMEDIATE_PORT env var if set
  
  ollama_options:
    keep_alive: "30m"
    num_ctx: 128000
  
  system_prompt: >
    You are a concise AI {role} for {department}. Answer questions directly using the provided information.
    
    CORE PRINCIPLES:
    - Get straight to the answer - no fluff or pleasantries
    - Use exact references from the knowledge base
    - One answer per question - don't anticipate follow-ups
    - Dense information, minimal words
    
    RESPONSE STYLE (Slack chat - mobile friendly):
    - Lead with the direct answer in first sentence
    - Use bullets only when listing 3+ items
    - Skip introductory phrases like "Based on the catalog..." or "According to..."
    - No markdown headers - use plain text organization
    - Maximum clarity, minimum tokens
    
    ACCURACY RULES:
    - Trust provided context from official sources
    - State facts without hedging unless truly uncertain
    - If context lacks info: "This information isn't in the provided knowledge base. Contact {contact_email}"
    - For partial info: Give what you have, state what's missing
    
    KEY POLICIES (state only when asked):
    - 42 upper division units required to graduate
    - 18 credit max per semester
    - Study abroad upper division courses count; lower division need UD replacement
    - "Every semester" = fall and spring
    - Waitlisted courses: Talk to instructor in person first week, then request permission code online
    
    WHEN TO BE COMPREHENSIVE vs BRIEF:
    - "What are the requirements" → Full list
    - "How many credits" → Just the number
    - "Can I take..." → Yes/no + critical constraint if any
    - "List all electives" → Complete list
    - "Tell me about [program]" → Key highlights only (5-7 bullets max)

# Retrieval Configuration
retrieval:
  initial_top_k: 40
  # after reranking
  final_top_k: 35
  enable_reranking: true 
  
  # Dynamic chunk allocation per collection type
  collection_weights:
    major_catalogs: 0.4
    minor_catalogs: 0.1
    4_year_plans: 0.35
    general_knowledge: 0.15
  
  # Minimum chunks per collection when active
  min_chunks_per_collection: 5
  max_chunks_per_collection: 20
  
  # Per-collection max limits
  collection_max_chunks:
    major_catalogs: 20
    minor_catalogs: 9
    4_year_plans: 6
    general_knowledge: 25
  
  # Total retrieval budget (will be distributed dynamically)
  total_retrieval_budget: 50
  
  k_dense: 50
  k_sparse: 50
  rrf_k: 60
  fuse_weights:
    dense: 0.7 # semantic search (nomic embed/something sexier on compute cluster)
    sparse: 0.3

# Memory Management Configuration
memory:
  # Number of messages before triggering conversation compression
  compression_threshold: 5

# Query Router Configuration
query_router:
  last_n_messages: 5
  routing_method: 'llm'
  use_intermediate_llm: true
  
  # token range for context retrieval
  min_tokens: 200
  max_tokens: 15000
  
  # Collection descriptions for LLM routing decisions
  collection_descriptions:
    major_catalogs: "Major program requirements, course requirements, and completion criteria for various Fowler School of Engineering majors"
    minor_catalogs: "Minor program requirements, course requirements, and completion criteria for various Fowler School of Engineering minors"
    4_year_plans: "Sample four-year degree plans showing semester-by-semester course sequencing, recommended schedules, and graduation timelines for different majors and catalog years"
    general_knowledge: "Academic policies, registration procedures, GPA requirements, study abroad information, course availability patterns, and general university guidelines"
  
  # Keyword mappings for simple routing (fallback if LLM unavailable)
  collection_keywords:
    4_year_plans:
      - "4-year"
      - "4 year"
      - "plan"
      - "schedule"
      - "sequence"
      - "timeline"
    minor_catalogs:
      - "minor"
      - "minors"
    major_catalogs:
      - "prerequisite"
      - "prereq"
      - "course"
      - "credit"
      - "requirement"
      - "major"
      - "degree"
      - "graduation"
    general_knowledge:
      - "policy"
      - "registration"
      - "gpa"
      - "study abroad"
      - "waitlist"# Reranker Configuration
reranker:
  model: "xitao/bge-reranker-v2-m3"
  batch_size: 32
  max_candidates_for_rerank: 200
  activation: "sigmoid"
