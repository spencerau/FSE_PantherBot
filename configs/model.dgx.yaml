# DGX cluster model config — merged over model.yaml when DGX=true
# Run ./scripts/dgx_up.sh to start all services before running tests.

backend: vllm

llm:
  host: localhost
  port: 10001
  primary_model: Qwen/Qwen3.6-35B-A3B
  temperature: 0.1
  top_p: 0.9
  max_tokens: 10000
  timeout: 300

intermediate_llm:
  host: localhost
  port: 10002
  model: Qwen/Qwen3.5-4B
  temperature: 0.1
  max_tokens: 20000
  timeout: 120
  think: true

embedding:
  host: localhost
  port: 10003
  backend: vllm
  model: "Qwen/Qwen3-Embedding-8B"

qdrant:
  host: localhost
  port: 10004

postgresql:
  host: localhost
  port: 10005
