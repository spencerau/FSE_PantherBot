[pytest]
asyncio_mode = auto
markers =
    year: marks tests as year-specific (delineates by catalog year)
    slow: marks tests as slow (delineates slow-running tests)
    integration: marks tests as integration tests requiring live services (Qdrant, Ollama, PostgreSQL)
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::pytest.PytestUnknownMarkWarning
